name: Build & Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  engine-parity:
    name: Kotlin/Python engine parity (bit-exact)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Kotlin compiler + org.json
        run: |
          curl -sLo kotlinc.zip https://github.com/JetBrains/kotlin/releases/download/v1.9.22/kotlin-compiler-1.9.22.zip
          unzip -q kotlinc.zip
          curl -sLo json.jar https://repo1.maven.org/maven2/org/json/json/20240303/json-20240303.jar

      # The bundled Python engine (app/src/main/python/lt_tts) is the reference: it is validated
      # bit-exact against the original hlas/transcr4 DLLs. The Kotlin engine must reproduce its
      # PCM output IDENTICALLY for every case.
      - name: Generate golden vectors (Python reference engine)
        run: python3 jvmtest/gen_golden.py

      - name: Compile Kotlin engine + parity harness
        run: |
          FILES=$(ls app/src/main/java/lt/gintaras/tts/engine/*.kt | grep -v -e 'Assets.kt' -e 'Engine.kt')
          kotlinc/bin/kotlinc $FILES jvmtest/JvmAssets.kt jvmtest/Harness.kt \
            -cp json.jar -include-runtime -d harness.jar

      - name: Run parity suite
        run: |
          java -cp harness.jar:json.jar lt.gintaras.tts.engine.HarnessKt \
            app/src/main/assets/lt_tts/data jvmtest/cases.tsv jvmtest/kotlin_out.tsv
          if diff jvmtest/golden.tsv jvmtest/kotlin_out.tsv; then
            echo "PARITY OK: all cases bit-identical"
          else
            echo "PARITY FAILURE: Kotlin output diverges from the Python reference" >&2
            exit 1
          fi

      # The parity harness runs on the DESKTOP JVM and cannot catch APIs that exist there but throw on
      # Android. Pattern.UNICODE_CHARACTER_CLASS is the worst offender: it threw at class init and made
      # the whole engine silent on-device for days (the harness stayed green). Block it (and raw
      # Pattern flags) so it can never come back unnoticed -- use \p{L} / [0-9] instead.
      - name: Guard against Android-incompatible regex APIs
        run: |
          # Match real usage only, not the explanatory comments that mention the flag by name
          # (a comment line's content starts with optional whitespace then //).
          hits=$(grep -rn "UNICODE_CHARACTER_CLASS" app/src/main/java | grep -vE ':[[:space:]]*//' || true)
          if [ -n "$hits" ]; then
            echo "$hits"
            echo "ERROR: Pattern.UNICODE_CHARACTER_CLASS is UNSUPPORTED on Android (throws at class init -> silent engine). Use \\p{L} for letters and [0-9] for digits." >&2
            exit 1
          fi
          echo "OK: no Android-incompatible regex flags"

  build:
    name: Build debug + release APKs (pure-Kotlin engine)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Both build types are signed with the STABLE keystore committed at app/debug.keystore (see
      # app/build.gradle.kts). A new build therefore installs as an update over the previous one.
      # versionCode comes from GITHUB_RUN_NUMBER (auto), so every published APK is a newer version.
      - name: Build debug + release APKs
        run: ./gradlew assembleDebug assembleRelease --stacktrace

      - name: Stage APKs
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk     dist/gintaras-tts-debug.apk
          cp app/build/outputs/apk/release/app-release.apk dist/gintaras-tts-release.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gintaras-tts-apks
          path: dist/*.apk
          if-no-files-found: error

      # Publish to a rolling "latest" release — overwritten on every push to main.
      - name: Publish to Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            dist/gintaras-tts-release.apk \
            dist/gintaras-tts-debug.apk \
            --title "Latest build (${GITHUB_SHA::7})" \
            --notes "Automatinis build iš commit \`${GITHUB_SHA::7}\`.

          **Diegimas:**
          1. Atsisiųsk \`gintaras-tts-release.apk\`
          2. Įdiek ant Android įrenginio
          3. Nustatymai → Kalba ir įvedimas → Teksto į kalbą išvestis → pasirink **Gintaras (Lietuvių)**" \
            --latest
